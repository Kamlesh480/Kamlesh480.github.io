<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kamlesh Chhipa — moved to kamlesh-chhipa.com</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta
      name="description"
      content="This site has moved. Kamlesh Chhipa's portfolio is now at https://kamlesh-chhipa.com/"
    />

    <!-- Tells search engines the content now lives at the new domain, so
         indexed pages/backlinks transfer their signal there instead of here. -->
    <link rel="canonical" href="https://kamlesh-chhipa.com/" />

    <!-- Immediate redirect for real visitors. GitHub Pages is static hosting
         with no server-side 301, so a 0-second meta refresh is the standard
         substitute — fires before the browser paints anything else. -->
    <meta http-equiv="refresh" content="0; url=https://kamlesh-chhipa.com/" />

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: #161410;
        color: #e8e4da;
        text-align: center;
        padding: 24px;
      }
      a { color: #e8e4da; }
    </style>
  </head>
  <body>
    <div>
      <p>This site has moved to <a href="https://kamlesh-chhipa.com/">kamlesh-chhipa.com</a>.</p>
      <p>Redirecting automatically&hellip; if nothing happens, click the link above.</p>
    </div>

    <!-- JS fallback in case the meta refresh is delayed or blocked by the browser. -->
    <script>
      window.location.replace("https://kamlesh-chhipa.com/");
    </script>
  </body>
</html>
